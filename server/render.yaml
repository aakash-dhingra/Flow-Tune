version: "3"

services:
  - type: web
    name: flowtune-backend
    env: node
    region: oregon # or your preferred region
    plan: free
    buildCommand: npm install && npx prisma generate && npx tsc
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false # Set this in the Render dashboard to your Vercel URL
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false # Set to https://your-render-url.onrender.com/api/auth/callback
      - key: DATABASE_URL
        sync: false # Set in Render dashboard (Supabase URL)
      - key: SESSION_SECRET
        generateValue: true
